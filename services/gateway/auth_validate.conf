# Internal auth sub-request location — must only be called via auth_request.
# Proxies to Evidence Collector's /internal/auth/validate endpoint, which:
#   • decodes the JWT from the Authorization header
#   • performs role-based access control (RBAC)
#   • returns 200 + X-User-Id / X-User-Role / X-Correlation-Id on success
#   • returns 401 for invalid/missing token, 403 for insufficient role
#
# The request body is suppressed (evidence files must not be forwarded here).
# X-Original-URI and X-Original-Method are forwarded so the validate endpoint
# can enforce RBAC rules that depend on the requested path and HTTP method.

location = /internal/auth/validate {
    internal;

    proxy_pass              http://evidence_service/internal/auth/validate;
    proxy_pass_request_body off;
    proxy_set_header        Content-Length    "";
    proxy_set_header        Authorization     $http_authorization;
    proxy_set_header        X-Original-URI    $request_uri;
    proxy_set_header        X-Original-Method $request_method;

    proxy_http_version 1.1;
    proxy_read_timeout 10s;
}
