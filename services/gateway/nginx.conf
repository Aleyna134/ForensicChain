worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Forensic evidence files (mobile extractions, disk images) can be large.
    client_max_body_size 100M;

    # ── Upstream service pool definitions ──────────────────────────────────────
    upstream evidence_service { server evidence-service:8001; }
    upstream custody_service  { server custody-service:8004;  }
    upstream report_service   { server report-service:8005;   }
    upstream ledger_service   { server ledger-service:8003;   }

    server {
        listen      8080;
        server_name localhost;

        # ── Auth sub-request handler (internal — not directly reachable) ───────
        include /etc/nginx/auth_validate.conf;

        # ── Shared proxy macro ─────────────────────────────────────────────────
        # proxy_set_header directives must appear in each location block.
        # Nginx drops inherited http-context headers the moment a location
        # defines its own proxy_set_header, so we keep them co-located and
        # explicit rather than relying on fragile inheritance.

        # ── Evidence Collector ─────────────────────────────────────────────────
        location /evidence {
            auth_request /internal/auth/validate;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $corr_id   $upstream_http_x_correlation_id;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Id         $user_id;
            proxy_set_header X-User-Role       $user_role;
            proxy_set_header X-Correlation-Id  $corr_id;

            proxy_pass         http://evidence_service;
            proxy_http_version 1.1;
            proxy_read_timeout 120s;  # large file uploads may take longer
        }

        # ── Chain of Custody ───────────────────────────────────────────────────
        location /custody {
            auth_request /internal/auth/validate;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $corr_id   $upstream_http_x_correlation_id;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Id         $user_id;
            proxy_set_header X-User-Role       $user_role;
            proxy_set_header X-Correlation-Id  $corr_id;

            proxy_pass         http://custody_service;
            proxy_http_version 1.1;
            proxy_read_timeout 30s;
        }

        # ── Audit Reporter ─────────────────────────────────────────────────────
        location /reports {
            auth_request /internal/auth/validate;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $corr_id   $upstream_http_x_correlation_id;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Id         $user_id;
            proxy_set_header X-User-Role       $user_role;
            proxy_set_header X-Correlation-Id  $corr_id;

            proxy_pass         http://report_service;
            proxy_http_version 1.1;
            proxy_read_timeout 120s;  # PDF generation may take time
        }

        # ── Immutable Ledger (internal, still auth-gated) ──────────────────────
        location /ledger {
            auth_request /internal/auth/validate;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $corr_id   $upstream_http_x_correlation_id;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Id         $user_id;
            proxy_set_header X-User-Role       $user_role;
            proxy_set_header X-Correlation-Id  $corr_id;

            proxy_pass         http://ledger_service;
            proxy_http_version 1.1;
            proxy_read_timeout 30s;
        }

        # ── Gateway health check (no auth required) ────────────────────────────
        # Probes Evidence Service reachability from the gateway.
        # Does NOT aggregate all service statuses — use individual host ports
        # during development to verify each service independently.
        location /health {
            proxy_pass         http://evidence_service/health;
            proxy_http_version 1.1;
        }
    }
}
