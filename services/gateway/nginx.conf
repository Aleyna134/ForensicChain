worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Forensic evidence files (mobile extractions, disk images) can be large.
    client_max_body_size 100M;

    # Docker's embedded DNS — used for variable-based proxy_pass so hostname
    # resolution is deferred to request time instead of nginx startup.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Upstream service pool definitions ──────────────────────────────────────
    # auth_service is intentionally absent: it uses a $variable proxy_pass so
    # DNS resolution is deferred, preventing startup failure when auth-service
    # hasn't registered with Docker DNS yet.
    upstream evidence_service { server evidence-service:8001; }
    upstream custody_service  { server custody-service:8004;  }
    upstream report_service   { server report-service:8005;   }
    upstream ledger_service   { server ledger-service:8003;   }
    upstream forensic_ui      { server forensic-ui:80;        }

    server {
        listen      8080;
        server_name localhost;

        # ── Auth sub-request handler (internal — not directly reachable) ───────
        include /etc/nginx/auth_validate.conf;

        # ── Shared proxy macro ─────────────────────────────────────────────────
        # proxy_set_header directives must appear in each location block.
        # Nginx drops inherited http-context headers the moment a location
        # defines its own proxy_set_header, so we keep them co-located and
        # explicit rather than relying on fragile inheritance.
        #
        # proxy_pass with a URI suffix (e.g. /evidence) causes nginx to replace
        # the matched location prefix with that suffix, stripping /api in transit:
        #   /api/evidence/abc  →  /evidence/abc sent to upstream

        # ── Auth Service — login (no auth_request: this is how tokens are obtained) ─
        # rewrite strips /api/auth prefix before forwarding to auth-service:8006
        location /api/auth/ {
            set $auth_svc "auth-service:8006";
            rewrite ^/api/auth/(.*)$ /auth/$1 break;
            proxy_pass         http://$auth_svc;
            proxy_http_version 1.1;
            proxy_read_timeout 10s;
        }

        # ── Evidence Collector ─────────────────────────────────────────────────
        location /api/evidence {
            auth_request /internal/auth/validate;
            auth_request_set $username  $upstream_http_x_username;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $corr_id   $upstream_http_x_correlation_id;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Username        $username;
            proxy_set_header X-User-Id         $user_id;
            proxy_set_header X-User-Role       $user_role;
            proxy_set_header X-Correlation-Id  $corr_id;

            proxy_pass         http://evidence_service/evidence;
            proxy_http_version 1.1;
            proxy_read_timeout 120s;
        }

        # ── Chain of Custody ───────────────────────────────────────────────────
        location /api/custody {
            auth_request /internal/auth/validate;
            auth_request_set $username  $upstream_http_x_username;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $corr_id   $upstream_http_x_correlation_id;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Username        $username;
            proxy_set_header X-User-Id         $user_id;
            proxy_set_header X-User-Role       $user_role;
            proxy_set_header X-Correlation-Id  $corr_id;

            proxy_pass         http://custody_service/custody;
            proxy_http_version 1.1;
            proxy_read_timeout 30s;
        }

        # ── Audit Reporter ─────────────────────────────────────────────────────
        location /api/reports {
            auth_request /internal/auth/validate;
            auth_request_set $username  $upstream_http_x_username;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $corr_id   $upstream_http_x_correlation_id;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Username        $username;
            proxy_set_header X-User-Id         $user_id;
            proxy_set_header X-User-Role       $user_role;
            proxy_set_header X-Correlation-Id  $corr_id;

            proxy_pass         http://report_service/reports;
            proxy_http_version 1.1;
            proxy_read_timeout 120s;
        }

        # ── Immutable Ledger ───────────────────────────────────────────────────
        location /api/ledger {
            auth_request /internal/auth/validate;
            auth_request_set $username  $upstream_http_x_username;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $corr_id   $upstream_http_x_correlation_id;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Username        $username;
            proxy_set_header X-User-Id         $user_id;
            proxy_set_header X-User-Role       $user_role;
            proxy_set_header X-Correlation-Id  $corr_id;

            proxy_pass         http://ledger_service/ledger;
            proxy_http_version 1.1;
            proxy_read_timeout 30s;
        }

        # ── Cases — proxied to auth-service (case list for upload dropdown) ──────
        location /api/cases {
            auth_request /internal/auth/validate;
            auth_request_set $username  $upstream_http_x_username;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $corr_id   $upstream_http_x_correlation_id;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Username        $username;
            proxy_set_header X-User-Id         $user_id;
            proxy_set_header X-User-Role       $user_role;
            proxy_set_header X-Correlation-Id  $corr_id;

            set $auth_svc "auth-service:8006";
            rewrite ^/api/cases(.*)$ /cases$1 break;
            proxy_pass         http://$auth_svc;
            proxy_http_version 1.1;
            proxy_read_timeout 10s;
        }

        # ── Admin — proxied back to auth-service (admin role enforced by both
        #    auth_request validate step and the endpoint itself)
        location /api/admin/ {
            auth_request /internal/auth/validate;
            auth_request_set $username  $upstream_http_x_username;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $corr_id   $upstream_http_x_correlation_id;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Username        $username;
            proxy_set_header X-User-Id         $user_id;
            proxy_set_header X-User-Role       $user_role;
            proxy_set_header X-Correlation-Id  $corr_id;

            set $auth_svc "auth-service:8006";
            rewrite ^/api/admin/(.*)$ /admin/$1 break;
            proxy_pass         http://$auth_svc;
            proxy_http_version 1.1;
            proxy_read_timeout 10s;
        }

        # ── Gateway health check (no auth required) ────────────────────────────
        location /health {
            proxy_pass         http://evidence_service/health;
            proxy_http_version 1.1;
        }

        # ── Frontend SPA (no auth — public shell) ──────────────────────────────
        # All unmatched paths fall through to the forensic-ui container.
        # SPA client-side routing is handled by try_files inside forensic-ui.
        location / {
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass         http://forensic_ui;
            proxy_http_version 1.1;
            proxy_read_timeout 30s;
        }
    }
}
