server {
    listen 80;
    server_name localhost;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Container health probe (called by gateway's liveness check) ───────────
    location = /health {
        add_header Content-Type application/json;
        return 200 '{"status":"ok","service":"forensic-ui"}';
    }

    # ── Static assets with long-lived cache headers ───────────────────────────
    location ~* \.(?:js|css|woff2?|ttf|svg|ico|png|jpg|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── SPA catch-all: unknown paths served as index.html ────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
