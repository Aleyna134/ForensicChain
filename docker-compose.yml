volumes:
  evidence_storage:
  evidence_db_data:
  ledger_db_data:
  custody_db_data:
  report_db_data:
  report_storage:
  auth_db_data:

networks:
  forensicchain_net:
    driver: bridge

services:

  # ── Databases ──────────────────────────────────────────────────────

  evidence-db:
    image: postgres:16-alpine
    container_name: evidence-db
    environment:
      POSTGRES_DB: evidence_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - evidence_db_data:/var/lib/postgresql/data
    # Development: uncomment "ports:" for direct DB access (psql, DBeaver etc.).
    # Services reach evidence-db:5432 via Docker network regardless.
    # ports:
    #   - "5433:5432"
    networks: [forensicchain_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d evidence_db"]
      interval: 5s
      retries: 5

  ledger-db:
    image: postgres:16-alpine
    container_name: ledger-db
    environment:
      POSTGRES_DB: ledger_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ledger_db_data:/var/lib/postgresql/data
    # Development: uncomment "ports:" for direct DB access.
    # ports:
    #   - "5434:5432"
    networks: [forensicchain_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ledger_db"]
      interval: 5s
      retries: 5

  custody-db:
    image: postgres:16-alpine
    container_name: custody-db
    environment:
      POSTGRES_DB: custody_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - custody_db_data:/var/lib/postgresql/data
    # Development: uncomment "ports:" for direct DB access.
    # ports:
    #   - "5435:5432"
    networks: [forensicchain_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d custody_db"]
      interval: 5s
      retries: 5

  report-db:
    image: postgres:16-alpine
    container_name: report-db
    environment:
      POSTGRES_DB: report_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - report_db_data:/var/lib/postgresql/data
    # Development: uncomment "ports:" for direct DB access.
    # ports:
    #   - "5436:5432"
    networks: [forensicchain_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d report_db"]
      interval: 5s
      retries: 5

  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    # Development: uncomment "ports:" for direct DB access.
    # ports:
    #   - "5437:5432"
    networks: [forensicchain_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d auth_db"]
      interval: 5s
      retries: 5

  # ── Message Broker ─────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    # AMQP port 5672 is exposed only within Docker network (services connect via container name).
    # Management UI 15672 remains host-accessible for monitoring.
    # Development: uncomment "5672:5672" in ports for direct AMQP access from host tools.
    ports:
      # - "5672:5672"    # dev only — close before demo
      - "15672:15672"    # management UI
    expose:
      - "5672"
    networks: [forensicchain_net]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Services ────────────────────────────────────────────────────────

  evidence-service:
    build: ./services/evidence-collector
    container_name: evidence-service
    env_file: .env
    volumes:
      - evidence_storage:/evidence-storage
    # All external traffic is forced through the API Gateway (port 8080 only).
    # Development: uncomment "ports:" for direct debugging without the gateway.
    # ports:
    #   - "8001:8001"
    expose:
      - "8001"
    networks: [forensicchain_net]
    depends_on:
      evidence-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      hash-sign-service:
        condition: service_healthy
      ledger-service:
        condition: service_started

  outbox-worker:
    build: ./services/evidence-collector
    container_name: outbox-worker
    command: ["python", "worker.py"]
    env_file: .env
    volumes:
      - evidence_storage:/evidence-storage
    networks: [forensicchain_net]
    depends_on:
      evidence-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  hash-sign-service:
    build: ./services/hash-sign
    container_name: hash-sign-service
    env_file: .env
    volumes:
      - evidence_storage:/evidence-storage:ro
      - ./keys:/keys:ro
    # Development: uncomment "ports:" for direct gRPC debugging.
    # ports:
    #   - "50051:50051"
    expose:
      - "50051"
      - "8002"
    networks: [forensicchain_net]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',50051),2)\" 2>/dev/null && echo ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ledger-service:
    build: ./services/immutable-ledger
    container_name: ledger-service
    env_file: .env
    # Development: uncomment "ports:" for direct gRPC/REST debugging.
    # ports:
    #   - "50052:50052"
    #   - "8003:8003"
    expose:
      - "50052"
      - "8003"
    networks: [forensicchain_net]
    depends_on:
      ledger-db:
        condition: service_healthy

  custody-service:
    build: ./services/chain-of-custody
    container_name: custody-service
    env_file: .env
    # Development: uncomment "ports:" for direct debugging.
    # ports:
    #   - "8004:8004"
    expose:
      - "8004"
    networks: [forensicchain_net]
    depends_on:
      custody-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  report-service:
    build: ./services/audit-reporter
    container_name: report-service
    env_file: .env
    volumes:
      - report_storage:/report-storage
    # Development: uncomment "ports:" for direct debugging.
    # ports:
    #   - "8005:8005"
    expose:
      - "8005"
    networks: [forensicchain_net]
    depends_on:
      report-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    env_file: .env
    expose:
      - "8006"
    networks: [forensicchain_net]
    depends_on:
      auth-db:
        condition: service_healthy

  forensic-ui:
    build: ./forensic-ui
    container_name: forensic-ui
    expose:
      - "80"
    networks: [forensicchain_net]

  gateway:
    build: ./services/gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    networks: [forensicchain_net]
    depends_on:
      - evidence-service
      - custody-service
      - report-service
      - ledger-service
      - auth-service
      - forensic-ui